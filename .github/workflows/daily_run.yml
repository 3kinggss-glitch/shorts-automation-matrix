name: Daily Faceless Video Arbitrage Engine

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code matrix
        uses: actions/checkout@v3

      - name: Initialize Free Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Video Components
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Inject Pipeline Dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-genai edge-tts

      - name: Execute Autonomous Production Circuit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py
