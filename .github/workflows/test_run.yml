name: Run Quick Test
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Locate and Execute Test
        run: |
          # Dynamically find the file path
          FILE_PATH=$(find . -name "quick_test.py" | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "❌ CRITICAL ERROR: quick_test.py not found in the repository."
            ls -R  # List all files so you can debug the structure
            exit 1
          fi
          
          echo "✅ Found file at: $FILE_PATH"
          python3 "$FILE_PATH"
