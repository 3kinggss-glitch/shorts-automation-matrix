name: Run Quick Test
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Locate and Execute Test
        run: |
          # Dynamically find the file path for test_env.py
          FILE_PATH=$(find . -name "test_env.py" | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "❌ CRITICAL ERROR: test_env.py not found in the repository."
            echo "Files present in this directory:"
            ls -R
            exit 1
          fi
          
          echo "✅ Found file at: $FILE_PATH"
          python3 "$FILE_PATH"
