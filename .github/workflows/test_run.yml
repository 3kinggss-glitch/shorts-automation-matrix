name: Run Quick Test
on: [workflow_dispatch] # This allows you to click a button to run it

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run test
        run: python quick_test.py
