name: Run Quick Test
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate and Execute Test
        run: |
          FILE_PATH=$(find . -name "test_env.py" | head -n 1)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ test_env.py not found!"
            exit 1
          fi
          python3 "$FILE_PATH"
